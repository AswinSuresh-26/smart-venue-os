steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/svos-backend:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/svos-backend:$SHORT_SHA'
      - '-f'
      - 'backend/Dockerfile'
      - '.'
    dir: '/'

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/svos-backend:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - run
      - '--filename=.'
      - '--image=gcr.io/$PROJECT_ID/svos-backend:latest'
      - '--location=us-central1'
      - '--namespace=default'

# Alternative simpler approach - deploy directly
onFailure:
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - deploy
      - '--service=svos-backend'
      - '--image=gcr.io/$PROJECT_ID/svos-backend:latest'

images:
  - 'gcr.io/$PROJECT_ID/svos-backend:latest'
  - 'gcr.io/$PROJECT_ID/svos-backend:$SHORT_SHA'

timeout: '1800s'
